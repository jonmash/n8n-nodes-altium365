schema: https://api.nexar.com/graphql
documents: 'shared/queries/**/*.graphql'
generates:
  shared/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-graphql-request
    config:
      skipTypename: false
      enumsAsTypes: true
      rawRequest: false
      dedupeFragments: true
      avoidOptionals:
        field: false
        object: false
        inputValue: false
      scalars:
        DateTime: string
        Decimal: number
        Long: number
        Upload: File
